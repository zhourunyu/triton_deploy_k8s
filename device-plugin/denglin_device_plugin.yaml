apiVersion: v1
kind: ServiceAccount
metadata:
  name: denglin-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: denglin-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: denglin-device-plugin-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: denglin-device-plugin
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: denglin-device-plugin-node-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: denglin-device-plugin
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: system:node-problem-detector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: denglin-device-plugin-node-reader-rolebinding
roleRef:
  kind: ClusterRole
  name: denglin-node-reader
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: denglin-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: denglin-device-plugin-validator
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["daemonsets", "controllerrevisions"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: denglin-device-plugin-validator-rolebinding
roleRef:
  kind: Role
  name: denglin-device-plugin-validator
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: denglin-device-plugin
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: denglin-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: denglin-device-plugin
    app: denglin-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: denglin-device-plugin
      app: denglin-device-plugin
  updateStrategy:
      type: OnDelete
  template:
    metadata:
      annotations:
        scheduler.alpha.kubernetes.io/critical-pod: ""
      labels:
        app.kubernetes.io/name: denglin-device-plugin
        app: denglin-device-plugin
        denglin.ai/webhook: ignore
    spec:
      runtimeClassName: denglin
      priorityClassName: "system-node-critical"
      serviceAccountName: denglin-device-plugin
      hostPID: true
      securityContext:
        {}
      containers:
      - name: denglin-device-plugin-ctr
        securityContext:
          privileged: true
        image: denglin-device-plugin:v0.10.11-2-gbff68c5-202512261226
        imagePullPolicy: IfNotPresent
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: DLI_POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: DLI_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: DLI_CONTAINER_NAME
            value: denglin-device-plugin-ctr
        args:
        - denglin-device-plugin
        - -mode=simple
        # - -unitsize=4096
        # - -share-replicas=16
        # - -mig-share-replicas=4
        # - -scheduler-endpoint=denglin-scheduler.default.svc.cluster.local:1080
        volumeMounts:
          - name: device-plugin
            mountPath: /var/lib/kubelet/device-plugins
          - name: device-plugin-vgpu
            mountPath: /usr/local/vgpu
          - name: cgroup
            mountPath: /sys/fs/cgroup
            readOnly: true
      initContainers:
      - name: validator
        image: denglin-device-plugin:v0.10.11-2-gbff68c5-202512261226
        imagePullPolicy: IfNotPresent
        command: ["/root/validator"]
        env:
          - name: DENGLIN_VALIDATOR_DEPENDENCE
            value: 
      - name: check
        image: denglin-device-plugin:v0.10.11-2-gbff68c5-202512261226
        imagePullPolicy: IfNotPresent
        command: ["/root/check_dlml"]
        volumeMounts:
        - name: rundir
          mountPath: /run/denglin
          mountPropagation: HostToContainer
        - name: user-local-bin
          mountPath: /host/usr/local/bin
          mountPropagation: HostToContainer
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: device-plugin-vgpu
          hostPath:
            path: /usr/local/vgpu
        - name: cgroup
          hostPath:
            type: Directory
            path: /sys/fs/cgroup
        - name: rundir
          hostPath:
            path: /run/denglin/
        - name: user-local-bin
          hostPath:
            path: /usr/local/bin
      nodeSelector:
        feature.node.kubernetes.io/pci-0b40_1e27.present: "true"
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - effect: NoSchedule
          key: denglin.com/gpu
          operator: Exists
        - effect: NoSchedule
          key: denglinai.com/gpu.upgrade
          operator: Exists
